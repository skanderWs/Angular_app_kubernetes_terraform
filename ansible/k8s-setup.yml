- name: Wait for SSH
  hosts: all
  gather_facts: no
  tasks:
    - name: Wait for SSH to be ready
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 300

- name: Setup Kubernetes Cluster
  hosts: all
  become: yes
  vars:
    pod_network_cidr: "192.168.0.0/16"

  tasks:

    - name: Disable swap
      command: swapoff -a
      ignore_errors: yes

    - name: Remove swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        replace: ''

    - name: Load kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Set sysctl params
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    - name: Apply sysctl
      command: sysctl --system

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - containerd
        state: present
        update_cache: yes

    - name: Configure containerd
      shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml

    - name: Restart containerd
      service:
        name: containerd
        state: restarted
        enabled: yes

    - name: Add Kubernetes repo
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /usr/share/keyrings/kubernetes-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /" > /etc/apt/sources.list.d/kubernetes.list

    - name: Install kube tools
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Hold kube packages
      command: apt-mark hold kubelet kubeadm kubectl


# ================= MASTER =================
- name: Init Master Node
  hosts: master
  become: yes
  vars:
    pod_network_cidr: "192.168.0.0/16"

  tasks:

    - name: Initialize cluster
      command: kubeadm init --pod-network-cidr={{ pod_network_cidr }}
      register: kubeadm_init

    - name: Get join command
      command: kubeadm token create --print-join-command
      register: join_command

    - name: Create kube directory
      file:
        path: /home/skander/.kube
        state: directory
        owner: skander
        group: skander
        mode: 0755

    - name: Copy admin.conf to user kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /home/skander/.kube/config
        remote_src: yes
        owner: skander
        group: skander
        mode: 0644

    - name: Install Calico network
      environment:
        KUBECONFIG: /home/skander/.kube/config
      command: kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml


# ================= WORKER =================
- name: Join Worker Node
  hosts: worker
  become: yes

  tasks:
    - name: Join cluster
      command: "{{ hostvars[groups['master'][0]].join_command.stdout }}"